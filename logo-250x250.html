<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPELLA WEB 250x250</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* EXACTLY 250x250 pixels */
        .logo {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .logo::before {
            content: "";
            position: absolute;
            top: -60px;
            right: -60px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d4af37 0%, #c9a227 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            margin-bottom: 12px;
            z-index: 1;
        }
        
        .icon::before {
            content: "C";
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            font-weight: 700;
            color: #1e3a5f;
        }
        
        .icon::after {
            content: "";
            position: absolute;
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            bottom: -8px;
            right: -8px;
        }
        
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            font-weight: 700;
            color: white;
            letter-spacing: 3px;
            text-align: center;
            z-index: 1;
            line-height: 1;
        }
        
        .name span {
            font-weight: 400;
            color: #d4af37;
        }
        
        .tagline {
            font-family: 'Lato', sans-serif;
            font-size: 0.5em;
            color: rgba(255,255,255,0.65);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 5px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- EXACT 250x250 logo - screenshot just this box -->
    <div class="logo" id="logoBox">
        <div class="icon"></div>
        <div class="name">CAPELLA<br><span>WEB</span></div>
        <div class="tagline">Website Design</div>
    </div>
</body>
</html>
